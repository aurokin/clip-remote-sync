name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          case "$VERSION" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "version must look like v1.0.0" >&2
              exit 1
              ;;
          esac
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify release tree
        run: make verify-release-tree
      - name: Build release artifacts
        run: make checksums
      - name: Check for existing release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $VERSION already exists" >&2
            exit 1
          fi
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            bin/crs \
            bin/crs-windows-amd64.exe \
            bin/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes
